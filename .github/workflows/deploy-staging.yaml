
name: Deploy to Staging

on:
  workflow_run:
    workflows:
      - "CI Quality & Security Gate"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       contains(github.event.workflow_run.pull_requests[*].base.ref, 'staging'))
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /home/appuser/frontend/staging
            git pull origin staging

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            pnpm install --frozen-lockfile
            pnpm build

            pm2 reload fe-staging --update-env || pm2 start pnpm --name fe-staging -- start -H 0.0.0.0 -p 3005
            pm2 save

      - name: Health check
        run: |
          for i in {1..10}; do
            curl --fail --max-time 10 "${{ secrets.STAGING_HEALTH_URL }}" && exit 0
            sleep 5
          done
          exit 1
