name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-deploy-staging
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Require CI Pass
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    steps:
      - name: Confirm CI workflow passed for this commit
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const maxAttempts = 20;
            const delayMs = 30000;
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              console.log(`Checking CI status (Attempt ${attempt}/${maxAttempts})...`);
              
              const runs = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: 'staging',
                event: 'push',
                per_page: 20, 
              });

              const targetRun = runs.data.workflow_runs.find(
                r => r.head_sha === context.sha && r.name === 'CI Quality & Security Gate'
              );

              if (targetRun) {
                if (targetRun.status === 'completed') {
                  if (targetRun.conclusion === 'success') {
                    console.log('CI Quality & Security Gate passed successfully!');
                    return;
                  } else {
                    core.setFailed(`CI Quality & Security Gate finished with conclusion: ${targetRun.conclusion}`);
                    return;
                  }
                } else {
                  console.log(`CI run is currently: ${targetRun.status}. Waiting...`);
                }
              } else {
                console.log('CI workflow run not detected yet. Waiting for it to trigger...');
              }

              if (attempt < maxAttempts) {
                await sleep(delayMs);
              }
            }

            core.setFailed('Timed out waiting for CI Quality & Security Gate to complete.');

  deploy:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality-gate
    environment: staging

    steps:
      - name: Checkout code
        uses: aactions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github' \
            -czf /tmp/fe-staging.tar.gz .

      - name: Copy archive to server
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: /tmp/fe-staging.tar.gz
          target: /tmp/

      - name: Deploy on server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            APP_DIR="/home/appuser/frontend/staging/"

            cd '"$APP_DIR"'
            tar -xzf /tmp/fe-staging.tar.gz -C '"$APP_DIR"'

            pm2 reload fe-staging --update-env || pm2 start pnpm --name fe-staging -- start -H 0.0.0.0 -p 3005
            pm2 save

            echo "==> Cleaning up..."
            rm -f /tmp/fe-staging.tar.gz

            echo "Staging deploy complete"

      - name: Health check
        run: |
          for i in {1..10}; do
            curl --fail --max-time 10 https://staging.energy-iq.hng14.com && exit 0
            sleep 5
          done
          exit 1
