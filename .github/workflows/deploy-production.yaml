name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-deploy-production
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Require CI Pass
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    steps:
      - name: Confirm CI workflow passed for this commit
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const maxAttempts = 20;
            const delayMs = 30000;
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              console.log(`Checking CI status (Attempt ${attempt}/${maxAttempts})...`);
              
              const runs = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: 'staging',
                event: 'push',
                per_page: 20, 
              });

              const targetRun = runs.data.workflow_runs.find(
                r => r.head_sha === context.sha && r.name === 'CI Quality & Security Gate'
              );

              if (targetRun) {
                if (targetRun.status === 'completed') {
                  if (targetRun.conclusion === 'success') {
                    console.log('CI Quality & Security Gate passed successfully!');
                    return;
                  } else {
                    core.setFailed(`CI Quality & Security Gate finished with conclusion: ${targetRun.conclusion}`);
                    return;
                  }
                } else {
                  console.log(`CI run is currently: ${targetRun.status}. Waiting...`);
                }
              } else {
                console.log('CI workflow run not detected yet. Waiting for it to trigger...');
              }

              if (attempt < maxAttempts) {
                await sleep(delayMs);
              }
            }

            core.setFailed('Timed out waiting for CI Quality & Security Gate to complete.');

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality-gate
    environment: main
    steps: 
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e 

            cd /home/appuser/frontend/prod

            git pull origin main

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            pnpm install --frozen-lockfile
            pnpm build

            pm2 reload fe-prod --update-env || pm2 start pnpm --name fe-prod -- start -H 0.0.0.0 -p 3006
            pm2 save

      - name: Health check
        run: |
          for i in {1..10}; do
            curl --fail --max-time 10 https://energy-iq.hng14.com && exit 0
            sleep 5
          done
          exit 1