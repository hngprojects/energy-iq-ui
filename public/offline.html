<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline · Energy IQ</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, sans-serif;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #ffffff;
        color: #111111;
        padding: 1.5rem;
        text-align: center;
      }
      img { width: 64px; height: 64px; }
      h1 { font-size: 1.5rem; font-weight: 600; }
      p { font-size: 0.95rem; color: #555; max-width: 320px; line-height: 1.5; }
      button {
        margin-top: 0.5rem;
        padding: 0.6rem 1.4rem;
        border: none;
        border-radius: 8px;
        background: #111;
        color: #fff;
        font-size: 0.9rem;
        cursor: pointer;
      }
      button:hover { background: #333; }
    </style>
  </head>
  <body>
    <img src="/icons/android-chrome-192x192.png" alt="Energy IQ" />
    <h1>You're offline</h1>
    <p>Check your connection and try again. Your data will sync once you're back online.</p>
    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>
